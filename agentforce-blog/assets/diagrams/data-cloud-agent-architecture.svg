<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title>Data Cloud Grounding Pattern</title>
  <desc>Unified profiles and calculated insights improve context quality when exposed carefully to the agent.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#075985"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#ecfeff" stop-opacity="0.98"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="860" rx="34" fill="#f8fafc"/>
  <rect x="26" y="26" width="1348" height="808" rx="30" fill="url(#bg)"/>
  <text x="78" y="92" font-family="'Merriweather', serif" font-size="42" fill="#ffffff" font-weight="700">Data Cloud Grounding Pattern</text>
  <text x="78" y="132" font-family="'Source Sans 3', sans-serif" font-size="24" fill="#a5f3fc">Unified profiles and calculated insights improve context quality when exposed carefully to the agent.</text>
  <path d="M420 260 H560" stroke="#a5f3fc" stroke-width="10" stroke-linecap="round"/>
  <path d="M840 260 H980" stroke="#a5f3fc" stroke-width="10" stroke-linecap="round"/>
  <path d="M700 338 V472" stroke="#a5f3fc" stroke-width="10" stroke-linecap="round"/>
  <path d="M420 614 H560" stroke="#a5f3fc" stroke-width="10" stroke-linecap="round"/>
  <path d="M840 614 H980" stroke="#a5f3fc" stroke-width="10" stroke-linecap="round"/>
  <rect x="110" y="180" width="310" height="160" rx="28" fill="url(#panel)"/>
  <rect x="545" y="180" width="310" height="160" rx="28" fill="url(#panel)"/>
  <rect x="980" y="180" width="310" height="160" rx="28" fill="url(#panel)"/>
  <rect x="110" y="530" width="310" height="160" rx="28" fill="url(#panel)"/>
  <rect x="545" y="530" width="310" height="160" rx="28" fill="url(#panel)"/>
  <rect x="980" y="530" width="310" height="160" rx="28" fill="url(#panel)"/>
  <text x="142" y="234" font-family="'Source Sans 3', sans-serif" font-size="18" fill="#075985" font-weight="700">01</text>
  <text x="142" y="274" font-family="'Source Sans 3', sans-serif" font-size="34" fill="#0f172a" font-weight="700">Sources</text>
  <text x="142" y="316" font-family="'Source Sans 3', sans-serif" font-size="26" fill="#475569">CRM, web, commerce, service</text>
  <text x="577" y="234" font-family="'Source Sans 3', sans-serif" font-size="18" fill="#075985" font-weight="700">02</text>
  <text x="577" y="274" font-family="'Source Sans 3', sans-serif" font-size="34" fill="#0f172a" font-weight="700">Identity</text>
  <text x="577" y="316" font-family="'Source Sans 3', sans-serif" font-size="26" fill="#475569">Resolution and profile unification</text>
  <text x="1012" y="234" font-family="'Source Sans 3', sans-serif" font-size="18" fill="#075985" font-weight="700">03</text>
  <text x="1012" y="274" font-family="'Source Sans 3', sans-serif" font-size="34" fill="#0f172a" font-weight="700">Profile</text>
  <text x="1012" y="316" font-family="'Source Sans 3', sans-serif" font-size="26" fill="#475569">Customer 360 attributes</text>
  <text x="142" y="584" font-family="'Source Sans 3', sans-serif" font-size="18" fill="#075985" font-weight="700">04</text>
  <text x="142" y="624" font-family="'Source Sans 3', sans-serif" font-size="34" fill="#0f172a" font-weight="700">Insights</text>
  <text x="142" y="666" font-family="'Source Sans 3', sans-serif" font-size="26" fill="#475569">Calculated insights and segments</text>
  <text x="577" y="584" font-family="'Source Sans 3', sans-serif" font-size="18" fill="#075985" font-weight="700">05</text>
  <text x="577" y="624" font-family="'Source Sans 3', sans-serif" font-size="34" fill="#0f172a" font-weight="700">Grounding</text>
  <text x="577" y="666" font-family="'Source Sans 3', sans-serif" font-size="26" fill="#475569">Prompt and retrieval context</text>
  <text x="1012" y="584" font-family="'Source Sans 3', sans-serif" font-size="18" fill="#075985" font-weight="700">06</text>
