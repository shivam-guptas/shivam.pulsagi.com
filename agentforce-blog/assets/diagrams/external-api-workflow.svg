<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title>External API Setup Flow</title>
  <desc>Use External Services where possible, then add retries, mapping, and safety controls around the integration.</desc>
  <defs>
    <linearGradient id="flowbg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="flowcard" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.99"/>
      <stop offset="100%" stop-color="#eff6ff" stop-opacity="0.98"/>
    </linearGradient>
    <filter id="flowshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="flowarrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#bae6fd"/>
    </marker>
  </defs>
  <rect width="1400" height="520" rx="30" fill="#f8fafc"/>
  <rect x="24" y="24" width="1352" height="472" rx="28" fill="url(#flowbg)"/>
  <rect x="52" y="156" width="1296" height="252" rx="30" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"/>
  <text x="76" y="86" font-family="'Merriweather', serif" font-size="38" fill="#ffffff" font-weight="700">External API Setup Flow</text>
  <text x="76" y="122" font-family="'Source Sans 3', sans-serif" font-size="22" fill="#bae6fd">Use External Services where possible, then add retries, mapping, and safety controls around the integration.</text>
  <path d="M264 280 H290" stroke="#bae6fd" stroke-width="8" stroke-linecap="round" marker-end="url(#flowarrow)"/>
  <path d="M472 280 H498" stroke="#bae6fd" stroke-width="8" stroke-linecap="round" marker-end="url(#flowarrow)"/>
  <path d="M680 280 H706" stroke="#bae6fd" stroke-width="8" stroke-linecap="round" marker-end="url(#flowarrow)"/>
  <path d="M888 280 H914" stroke="#bae6fd" stroke-width="8" stroke-linecap="round" marker-end="url(#flowarrow)"/>
  <path d="M1096 280 H1122" stroke="#bae6fd" stroke-width="8" stroke-linecap="round" marker-end="url(#flowarrow)"/>
  <g>
    <rect x="82" y="188" width="182" height="184" rx="26" fill="url(#flowcard)" stroke="rgba(15,23,42,0.08)" filter="url(#flowshadow)"/>
    <rect x="98" y="204" width="150" height="150" rx="20" fill="rgba(255,255,255,0.58)" stroke="rgba(255,255,255,0.5)"/>
    <text x="106" y="234" font-family="'IBM Plex Mono', monospace" font-size="20" fill="#0f172a" font-weight="700">STEP 1</text>
    <text x="106" y="282" font-family="'Source Sans 3', sans-serif" font-size="21" fill="#0f172a" font-weight="700"><tspan x="106" dy="0">Choose</tspan><tspan x="106" dy="26">pattern</tspan></text>
  </g>
  <g>
    <rect x="290" y="188" width="182" height="184" rx="26" fill="url(#flowcard)" stroke="rgba(15,23,42,0.08)" filter="url(#flowshadow)"/>
    <rect x="306" y="204" width="150" height="150" rx="20" fill="rgba(255,255,255,0.58)" stroke="rgba(255,255,255,0.5)"/>
    <text x="314" y="234" font-family="'IBM Plex Mono', monospace" font-size="20" fill="#0f172a" font-weight="700">STEP 2</text>
    <text x="314" y="282" font-family="'Source Sans 3', sans-serif" font-size="21" fill="#0f172a" font-weight="700"><tspan x="314" dy="0">Configure</tspan><tspan x="314" dy="26">auth</tspan></text>
  </g>
  <g>
    <rect x="498" y="188" width="182" height="184" rx="26" fill="url(#flowcard)" stroke="rgba(15,23,42,0.08)" filter="url(#flowshadow)"/>
    <rect x="514" y="204" width="150" height="150" rx="20" fill="rgba(255,255,255,0.58)" stroke="rgba(255,255,255,0.5)"/>
    <text x="522" y="234" font-family="'IBM Plex Mono', monospace" font-size="20" fill="#0f172a" font-weight="700">STEP 3</text>
    <text x="522" y="282" font-family="'Source Sans 3', sans-serif" font-size="21" fill="#0f172a" font-weight="700"><tspan x="522" dy="0">Import schema</tspan></text>
  </g>
  <g>
    <rect x="706" y="188" width="182" height="184" rx="26" fill="url(#flowcard)" stroke="rgba(15,23,42,0.08)" filter="url(#flowshadow)"/>
    <rect x="722" y="204" width="150" height="150" rx="20" fill="rgba(255,255,255,0.58)" stroke="rgba(255,255,255,0.5)"/>
    <text x="730" y="234" font-family="'IBM Plex Mono', monospace" font-size="20" fill="#0f172a" font-weight="700">STEP 4</text>
    <text x="730" y="282" font-family="'Source Sans 3', sans-serif" font-size="21" fill="#0f172a" font-weight="700"><tspan x="730" dy="0">Map IO fields</tspan></text>
  </g>
  <g>
    <rect x="914" y="188" width="182" height="184" rx="26" fill="url(#flowcard)" stroke="rgba(15,23,42,0.08)" filter="url(#flowshadow)"/>
    <rect x="930" y="204" width="150" height="150" rx="20" fill="rgba(255,255,255,0.58)" stroke="rgba(255,255,255,0.5)"/>
    <text x="938" y="234" font-family="'IBM Plex Mono', monospace" font-size="20" fill="#0f172a" font-weight="700">STEP 5</text>
    <text x="938" y="282" font-family="'Source Sans 3', sans-serif" font-size="21" fill="#0f172a" font-weight="700"><tspan x="938" dy="0">Add retries</tspan></text>
  </g>
  <g>
    <rect x="1122" y="188" width="182" height="184" rx="26" fill="url(#flowcard)" stroke="rgba(15,23,42,0.08)" filter="url(#flowshadow)"/>
    <rect x="1138" y="204" width="150" height="150" rx="20" fill="rgba(255,255,255,0.58)" stroke="rgba(255,255,255,0.5)"/>
    <text x="1146" y="234" font-family="'IBM Plex Mono', monospace" font-size="20" fill="#0f172a" font-weight="700">STEP 6</text>
    <text x="1146" y="282" font-family="'Source Sans 3', sans-serif" font-size="21" fill="#0f172a" font-weight="700"><tspan x="1146" dy="0">Test</tspan><tspan x="1146" dy="26">fallbacks</tspan></text>
  </g>
</svg>
