<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc"><title>Agent Reasoning Flow</title><desc>A multi-step reasoning sequence for grounding, planning, acting, and validating.</desc><defs><linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="#0b5cab"/><stop offset="100%" stop-color="#0f766e"/></linearGradient><linearGradient id="card" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/><stop offset="100%" stop-color="#e8f1fb" stop-opacity="0.96"/></linearGradient></defs><rect width="1200" height="700" rx="32" fill="#f8fafc"/><rect x="30" y="30" width="1140" height="640" rx="28" fill="url(#bg)"/><rect x="90" y="110" width="240" height="120" rx="24" fill="url(#card)"/><rect x="480" y="110" width="240" height="120" rx="24" fill="url(#card)"/><rect x="870" y="110" width="240" height="120" rx="24" fill="url(#card)"/><rect x="220" y="360" width="240" height="120" rx="24" fill="url(#card)"/><rect x="610" y="360" width="240" height="120" rx="24" fill="url(#card)"/><path d="M330 170 H480" stroke="#dbeafe" stroke-width="10" stroke-linecap="round"/><path d="M720 170 H870" stroke="#dbeafe" stroke-width="10" stroke-linecap="round"/><path d="M600 230 V360" stroke="#dbeafe" stroke-width="10" stroke-linecap="round"/><path d="M330 480 H610" stroke="#dbeafe" stroke-width="10" stroke-linecap="round"/><text x="110" y="150" font-family="'Source Sans 3', sans-serif" font-size="24" fill="#0f172a" font-weight="700">Intent</text><text x="110" y="184" font-family="'Source Sans 3', sans-serif" font-size="20" fill="#475569">Classify the request</text><text x="500" y="150" font-family="'Source Sans 3', sans-serif" font-size="24" fill="#0f172a" font-weight="700">Context</text><text x="500" y="184" font-family="'Source Sans 3', sans-serif" font-size="20" fill="#475569">Retrieve trusted facts</text><text x="890" y="150" font-family="'Source Sans 3', sans-serif" font-size="24" fill="#0f172a" font-weight="700">Plan</text><text x="890" y="184" font-family="'Source Sans 3', sans-serif" font-size="20" fill="#475569">Select safe actions</text><text x="240" y="400" font-family="'Source Sans 3', sans-serif" font-size="24" fill="#0f172a" font-weight="700">Act</text><text x="240" y="434" font-family="'Source Sans 3', sans-serif" font-size="20" fill="#475569">Execute Flow or Apex</text><text x="630" y="400" font-family="'Source Sans 3', sans-serif" font-size="24" fill="#0f172a" font-weight="700">Validate</text><text x="630" y="434" font-family="'Source Sans 3', sans-serif" font-size="20" fill="#475569">Summarize and log</text><text x="90" y="72" font-family="'Merriweather', serif" font-size="34" fill="#ffffff" font-weight="700">Agent Reasoning Flow</text></svg>
