<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title>Custom Apex Action Build Flow</title>
  <desc>Apex actions should be introduced as small, well-described contracts, not generic service endpoints.</desc>
  <defs>
    <linearGradient id="flowbg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="flowcard" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#f5f3ff" stop-opacity="0.98"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="520" rx="30" fill="#f8fafc"/>
  <rect x="24" y="24" width="1352" height="472" rx="28" fill="url(#flowbg)"/>
  <text x="76" y="86" font-family="'Merriweather', serif" font-size="38" fill="#ffffff" font-weight="700">Custom Apex Action Build Flow</text>
  <text x="76" y="122" font-family="'Source Sans 3', sans-serif" font-size="22" fill="#ddd6fe">Apex actions should be introduced as small, well-described contracts, not generic service endpoints.</text>
  <path d="M262 284 H336" stroke="#ddd6fe" stroke-width="8" stroke-linecap="round"/>
  <path d="M472 284 H546" stroke="#ddd6fe" stroke-width="8" stroke-linecap="round"/>
  <path d="M682 284 H756" stroke="#ddd6fe" stroke-width="8" stroke-linecap="round"/>
  <path d="M892 284 H966" stroke="#ddd6fe" stroke-width="8" stroke-linecap="round"/>
  <path d="M1102 284 H1176" stroke="#ddd6fe" stroke-width="8" stroke-linecap="round"/>
  <rect x="82" y="190" width="180" height="180" rx="26" fill="url(#flowcard)"/>
  <rect x="292" y="190" width="180" height="180" rx="26" fill="url(#flowcard)"/>
  <rect x="502" y="190" width="180" height="180" rx="26" fill="url(#flowcard)"/>
  <rect x="712" y="190" width="180" height="180" rx="26" fill="url(#flowcard)"/>
  <rect x="922" y="190" width="180" height="180" rx="26" fill="url(#flowcard)"/>
  <rect x="1132" y="190" width="180" height="180" rx="26" fill="url(#flowcard)"/>
  <text x="106" y="236" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#4c1d95" font-weight="700">STEP 1</text>
  <text x="316" y="236" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#4c1d95" font-weight="700">STEP 2</text>
  <text x="526" y="236" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#4c1d95" font-weight="700">STEP 3</text>
  <text x="736" y="236" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#4c1d95" font-weight="700">STEP 4</text>
  <text x="946" y="236" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#4c1d95" font-weight="700">STEP 5</text>
  <text x="1156" y="236" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#4c1d95" font-weight="700">STEP 6</text>
  <text x="106" y="288" font-family="'Source Sans 3', sans-serif" font-size="22" fill="#0f172a" font-weight="700">Define the action</text>
  <text x="316" y="288" font-family="'Source Sans 3', sans-serif" font-size="22" fill="#0f172a" font-weight="700">Model IO wrappers</text>
  <text x="526" y="288" font-family="'Source Sans 3', sans-serif" font-size="22" fill="#0f172a" font-weight="700">Implement invocable Apex</text>
  <text x="736" y="288" font-family="'Source Sans 3', sans-serif" font-size="22" fill="#0f172a" font-weight="700">Validate security</text>
  <text x="946" y="288" font-family="'Source Sans 3', sans-serif" font-size="22" fill="#0f172a" font-weight="700">Write tests</text>
  <text x="1156" y="288" font-family="'Source Sans 3', sans-serif" font-size="22" fill="#0f172a" font-weight="700">Register in Builder</text>
