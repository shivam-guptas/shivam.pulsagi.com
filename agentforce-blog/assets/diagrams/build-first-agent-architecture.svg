  <text x="142" y="316" font-family="'Source Sans 3', sans-serif" font-size="26" fill="#475569">Agent role and channel</text>
  <text x="577" y="234" font-family="'Source Sans 3', sans-serif" font-size="18" fill="#14532d" font-weight="700">02</text>
  <text x="577" y="274" font-family="'Source Sans 3', sans-serif" font-size="34" fill="#0f172a" font-weight="700">Topic</text>
  <text x="577" y="316" font-family="'Source Sans 3', sans-serif" font-size="26" fill="#475569">Single job to be done</text>
  <text x="1012" y="234" font-family="'Source Sans 3', sans-serif" font-size="18" fill="#14532d" font-weight="700">03</text>
  <text x="1012" y="274" font-family="'Source Sans 3', sans-serif" font-size="34" fill="#0f172a" font-weight="700">Prompt</text>
  <text x="1012" y="316" font-family="'Source Sans 3', sans-serif" font-size="26" fill="#475569">Instructions and variables</text>
