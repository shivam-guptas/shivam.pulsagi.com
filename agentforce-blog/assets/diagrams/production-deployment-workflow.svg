<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title>Production Deployment Flow</title>
  <desc>Treat prompts, actions, and trust settings as release-managed assets with explicit ownership.</desc>
  <defs>
    <linearGradient id="flowbg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="flowcard" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#f0fdf4" stop-opacity="0.98"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="520" rx="30" fill="#f8fafc"/>
  <rect x="24" y="24" width="1352" height="472" rx="28" fill="url(#flowbg)"/>
  <text x="76" y="86" font-family="'Merriweather', serif" font-size="38" fill="#ffffff" font-weight="700">Production Deployment Flow</text>
  <text x="76" y="122" font-family="'Source Sans 3', sans-serif" font-size="22" fill="#dcfce7">Treat prompts, actions, and trust settings as release-managed assets with explicit ownership.</text>
  <path d="M262 284 H336" stroke="#dcfce7" stroke-width="8" stroke-linecap="round"/>
  <path d="M472 284 H546" stroke="#dcfce7" stroke-width="8" stroke-linecap="round"/>
