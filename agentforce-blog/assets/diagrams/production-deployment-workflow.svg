  <path d="M1102 284 H1176" stroke="#dcfce7" stroke-width="8" stroke-linecap="round"/>
  <rect x="82" y="190" width="180" height="180" rx="26" fill="url(#flowcard)"/>
  <rect x="292" y="190" width="180" height="180" rx="26" fill="url(#flowcard)"/>
  <rect x="502" y="190" width="180" height="180" rx="26" fill="url(#flowcard)"/>
  <rect x="712" y="190" width="180" height="180" rx="26" fill="url(#flowcard)"/>
  <rect x="922" y="190" width="180" height="180" rx="26" fill="url(#flowcard)"/>
  <rect x="1132" y="190" width="180" height="180" rx="26" fill="url(#flowcard)"/>
  <text x="106" y="236" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#1f2937" font-weight="700">STEP 1</text>
  <text x="316" y="236" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#1f2937" font-weight="700">STEP 2</text>
  <text x="526" y="236" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#1f2937" font-weight="700">STEP 3</text>
  <text x="736" y="236" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#1f2937" font-weight="700">STEP 4</text>
  <text x="946" y="236" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#1f2937" font-weight="700">STEP 5</text>
  <text x="1156" y="236" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#1f2937" font-weight="700">STEP 6</text>
  <text x="106" y="288" font-family="'Source Sans 3', sans-serif" font-size="22" fill="#0f172a" font-weight="700">Version assets</text>
  <text x="316" y="288" font-family="'Source Sans 3', sans-serif" font-size="22" fill="#0f172a" font-weight="700">Run eval packs</text>
  <text x="526" y="288" font-family="'Source Sans 3', sans-serif" font-size="22" fill="#0f172a" font-weight="700">Promote to UAT</text>
  <text x="736" y="288" font-family="'Source Sans 3', sans-serif" font-size="22" fill="#0f172a" font-weight="700">Launch pilot</text>
  <text x="946" y="288" font-family="'Source Sans 3', sans-serif" font-size="22" fill="#0f172a" font-weight="700">Watch telemetry</text>
  <text x="1156" y="288" font-family="'Source Sans 3', sans-serif" font-size="22" fill="#0f172a" font-weight="700">Rollback or tune</text>
