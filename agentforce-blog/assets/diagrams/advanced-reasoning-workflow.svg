  <text x="736" y="236" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#581c87" font-weight="700">STEP 4</text>
  <text x="946" y="236" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#581c87" font-weight="700">STEP 5</text>
  <text x="1156" y="236" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#581c87" font-weight="700">STEP 6</text>
