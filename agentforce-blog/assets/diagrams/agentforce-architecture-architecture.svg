<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title>Agentforce Runtime Architecture</title>
  <desc>Topics, Atlas reasoning, grounding, actions, and trust controls working as one system.</desc>
  <defs>
