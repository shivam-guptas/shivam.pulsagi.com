<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title>Prompt Builder Composition</title>
  <desc>Prompt templates combine instructions, grounded inputs, output shape, and evaluation.</desc>
