  <text x="142" y="316" font-family="'Source Sans 3', sans-serif" font-size="26" fill="#475569">Business task and audience</text>
  <text x="577" y="234" font-family="'Source Sans 3', sans-serif" font-size="18" fill="#7c2d12" font-weight="700">02</text>
  <text x="577" y="274" font-family="'Source Sans 3', sans-serif" font-size="34" fill="#0f172a" font-weight="700">Instructions</text>
  <text x="577" y="316" font-family="'Source Sans 3', sans-serif" font-size="26" fill="#475569">Role, tone, policies</text>
  <text x="1012" y="234" font-family="'Source Sans 3', sans-serif" font-size="18" fill="#7c2d12" font-weight="700">03</text>
  <text x="1012" y="274" font-family="'Source Sans 3', sans-serif" font-size="34" fill="#0f172a" font-weight="700">Inputs</text>
  <text x="1012" y="316" font-family="'Source Sans 3', sans-serif" font-size="26" fill="#475569">Merge fields and variables</text>
  <text x="142" y="584" font-family="'Source Sans 3', sans-serif" font-size="18" fill="#7c2d12" font-weight="700">04</text>
  <text x="142" y="624" font-family="'Source Sans 3', sans-serif" font-size="34" fill="#0f172a" font-weight="700">Grounding</text>
  <text x="142" y="666" font-family="'Source Sans 3', sans-serif" font-size="26" fill="#475569">Flow, Apex, related data</text>
